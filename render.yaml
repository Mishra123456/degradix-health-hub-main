services:
  - type: web
    name: degradix-api
    env: python
    branch: main
    buildCommand: pip install -r backend/requirements.txt && cd backend && python train_models.py
    startCommand: cd backend && uvicorn app:app --host 0.0.0.0 --port 10000
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: PYTHONPATH
        value: /opt/render/project/src/backend
      - key: FRONTEND_URL
        sync: false
